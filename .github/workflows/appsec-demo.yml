        ~/.local/bin/orca-cli --exit-code 0 -p "${PROJECT_KEY}" --api-token "${ORCA_SECURITY_API_TOKEN}" sast scan --path $(pwd)

  SCAScan:
    runs-on: ubuntu-latest
